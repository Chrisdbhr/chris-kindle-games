<!DOCTYPE html>
<html lang="en" manifest="manifest.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Play Word Search (Caça Palavras) optimized for Amazon Kindle E-Readers. By Christopher Ravailhe (chrisjogos.com).">
    <meta name="keywords" content="Word Search, Caca Palavras, Kindle Game, E-Ink">
    <meta name="author" content="Christopher Ravailhe">
    <title data-i18n="wordsearch_title">Caça-Palavras</title>
    <link rel="stylesheet" href="css/style.css?v=17">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="index.html" class="btn" data-i18n="back_menu" style="padding: 2px 10px;">Menu</a>
            </div>
            <span class="brand-text">chrisjogos.com</span>
            <div class="header-right">
                <h1 data-i18n="wordsearch_title">Caça-Palavras</h1>
            </div>
        </header>

        <main>
            <div id="setup-screen" style="text-align: center; margin-top: 20px;">
                <img src="img/thumb_wordsearch.png" class="detail-thumb" alt="">
                <p data-i18n="wordsearch_rules" style="margin: 15px 10px; font-size: 16px; border: 1px solid black; padding: 10px;"></p>
                <div class="mode-selector" style="margin: 20px 0;">
                    <button class="btn" id="btn-ws-easy" data-i18n="diff_easy" onclick="setDiffAndUI('easy')">Fácil</button>
                    <button class="btn" id="btn-ws-med" data-i18n="diff_med" onclick="setDiffAndUI('medium')">Médio</button>
                    <button class="btn" id="btn-ws-hard" data-i18n="diff_hard" onclick="setDiffAndUI('hard')">Difícil</button>
                </div>
                <p id="diff-desc-text" style="margin-bottom: 30px; font-style: italic;"></p>
                <button class="btn" data-i18n="btn_start" onclick="startGame()" style="font-size: 20px; padding: 10px 30px;">Iniciar</button>
            </div>

            <div id="game-screen" style="display: none;">
                <div class="status-message" id="status-message"></div>

                <div class="wordsearch-board" id="wordsearch-board">
                    <!-- Board goes here -->
                </div>

                <div class="wordsearch-list" id="wordsearch-list">
                    <!-- Words go here -->
                </div>
                
                <div class="controls" style="margin-top:20px;">
                    <button class="btn" data-i18n="play_again" onclick="backToMenu()">Jogar Novamente</button>
                </div>
            </div>
        </main>
    </div>
    <script src="js/lang.js?v=9"></script>
    <script src="js/wordsearch.js?v=9"></script>
    <script src="js/scale.js?v=1"></script>
</body>
</html>
