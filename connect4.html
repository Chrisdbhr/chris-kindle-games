<!DOCTYPE html>
<html lang="pt" manifest="manifest.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Jogue Ligue 4 otimizado para Amazon Kindle E-Readers. Por Christopher Ravailhe (chrisjogos.com).">
    <meta name="keywords" content="Ligue 4, Connect 4, Kindle Game, E-Ink">
    <meta name="author" content="Christopher Ravailhe">
    <title data-i18n="connect4_title">Ligue 4</title>
    <link rel="stylesheet" href="css/style.css?v=21">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="index.html" class="btn" data-i18n="back_menu" style="padding: 2px 10px;">Menu</a>
            </div>
            <span class="brand-text">chrisjogos.com</span>
            <div class="header-right">
                <h1 data-i18n="connect4_title">Ligue 4</h1>
            </div>
        </header>

        <main>

            <div id="setup-screen" style="text-align: center;">
            <img src="img/thumb_connect4.png" class="detail-thumb" alt="">
                <p data-i18n="connect4_rules" style="margin: 15px 10px; font-size: 16px; border: 1px solid black; padding: 10px;"></p>
                
                <div class="mode-selector" style="margin: 20px 0;">
                    <button class="btn" id="btn-pvp" data-i18n="mode_pvp" onclick="setMode('pvp')">Jogador vs Jogador</button>
                    <button class="btn" id="btn-pve" data-i18n="mode_pve" onclick="setMode('pve')">Jogador vs IA</button>
                </div>
                
                <div id="difficulty-selector" style="display: none;">
                    <h3 data-i18n="select_diff_ai" style="margin-bottom: 10px; font-size: 18px;">Dificuldade da IA:</h3>
                    <div class="mode-selector">
                        <button class="btn" id="btn-c4-easy" data-i18n="diff_easy" onclick="setDifficulty('easy')">Fácil</button>
                        <button class="btn" id="btn-c4-med" data-i18n="diff_med" onclick="setDifficulty('medium')">Médio</button>
                        <button class="btn" id="btn-c4-hard" data-i18n="diff_hard" onclick="setDifficulty('hard')">Difícil</button>
                    </div>
                </div>

                <p id="diff-desc-text" style="margin-bottom: 30px; font-style: italic;"></p>
                
                <button class="btn" data-i18n="btn_start" onclick="startGame()" style="font-size: 20px; padding: 10px 30px; display: inline-block; margin: 0 auto;">Iniciar</button>
            </div>

            <div id="game-screen" style="display: none;">

            <div class="scores" style="margin-bottom: 10px;">
                <div><span id="label-score-1" data-i18n="score_p1_c4">Jogador 1 (Preto): </span><span id="score-1">0</span></div>
                <div><span id="label-score-2" data-i18n="score_p2_c4">Jogador 2 (Branco): </span><span id="score-2">0</span></div>
            </div>

            <div class="status-message" id="status-message" style="margin-bottom: 10px;"></div>

            <div class="connect4-board" id="board">
                <!-- Cells will be generated here -->
            </div>

            <div class="controls">
                <button class="btn" id="btn-reset-game" data-i18n="play_again" onclick="resetGame()" style="display: block; margin: 10px auto; font-size: 18px; padding: 10px 20px;">Jogar Novamente</button>
                <button class="btn" id="btn-reset-score" data-i18n="reset_score" onclick="handleResetScore()">Zerar Placar</button>
                <button class="btn" id="btn-back-menu" data-i18n="back_menu" onclick="backToMenu()">Voltar ao Menu Principal</button>
            </div>
            
            </div>
        </main>

        <div id="reset-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <p data-i18n="reset_confirm">Tem certeza que deseja zerar o placar?</p>
                <button class="btn" onclick="confirmReset(true)" data-i18n="btn_yes">Sim</button>
                <button class="btn" onclick="confirmReset(false)" data-i18n="btn_no">Não</button>
            </div>
        </div>
    </div>
    <script src="js/lang.js?v=10"></script>
    <script src="js/connect4.js?v=1"></script>
    <script src="js/scale.js?v=2"></script>
</body>
</html>
