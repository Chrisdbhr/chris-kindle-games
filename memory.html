<!DOCTYPE html>
<html lang="en" manifest="manifest.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Play Memory Game (Jogo da Memória) optimized for Amazon Kindle E-Readers. By Christopher Ravailhe (chrisjogos.com).">
    <meta name="keywords" content="Memory Game, Jogo da Memoria, Kindle Game, E-Ink">
    <meta name="author" content="Christopher Ravailhe">
    <title data-i18n="memory_title">Jogo da Memória</title>
    <link rel="stylesheet" href="css/style.css?v=17">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: baseline;">
                <h1 data-i18n="memory_title">Jogo da Memória</h1>
                <span class="brand-text">chrisjogos.com</span>
            </div>
            <a href="index.html" class="btn" data-i18n="back_menu">Voltar ao Menu</a>
        </header>

        <main>

            <div id="setup-screen" style="text-align: center; margin-top: 20px;">
                <img src="img/thumb_memory.png" class="detail-thumb" alt="">
                <p data-i18n="memory_rules" style="margin: 15px 10px; font-size: 16px; border: 1px solid black; padding: 10px;"></p>
                <div class="mode-selector" style="margin: 20px 0;">
                    <button class="btn" id="btn-mem-easy" data-i18n="diff_easy" onclick="setDiffAndUI('easy')">Fácil</button>
                    <button class="btn" id="btn-mem-med" data-i18n="diff_med" onclick="setDiffAndUI('medium')">Médio</button>
                    <button class="btn" id="btn-mem-hard" data-i18n="diff_hard" onclick="setDiffAndUI('hard')">Difícil</button>
                </div>
                <p id="diff-desc-text" style="margin-bottom: 30px; font-style: italic;"></p>
                <button class="btn" data-i18n="btn_start" onclick="startGame()" style="font-size: 20px; padding: 10px 30px;">Iniciar</button>
            </div>

            <div id="game-screen" style="display: none;">
                <div class="scores" style="justify-content: center;">
                    <div><span data-i18n="moves">Movimentos: </span><span id="score-moves">0</span></div>
                </div>

                <div class="status-message" id="status-message"></div>

                <div class="memory-board" id="memory-board">
                    <!-- Cards will be generated here -->
                </div>

                <div class="controls">
                    <button class="btn" id="btn-reset-game" data-i18n="play_again" onclick="backToMenu()">Jogar Novamente</button>
                </div>
            </div>
        </main>
    </div>
    <script src="js/lang.js?v=12"></script>
    <script src="js/memory.js?v=12"></script>
</body>
</html>
